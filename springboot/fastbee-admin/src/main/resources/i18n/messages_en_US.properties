ai.chat.codebase.fallback.config=No sufficiently specific configuration entry was matched. Provide a config file name, config class name, or module name so I can narrow it down.
ai.chat.codebase.fallback.sql.xml=No sufficiently specific Mapper XML / SQL entry was matched. Provide the Mapper name, table name, API path, or method name so I can narrow it down.
ai.chat.codebase.fallback.complete.implementation=This is better answered with abstract pseudocode and modification steps based on the project stack. If you want exact files, provide the module name, page name, or API name.
ai.chat.codebase.fallback.source.location=No sufficiently specific source location entry was matched. Provide a class name, method name, API path, page name, or module name so I can narrow it down.
ai.chat.route.fallback.codebase.safety=The question asks for full source, real source, sensitive configuration, or complete implementation. The system switches to Platform Assistant for safety fallback.
ai.chat.route.fallback.suspicious.device.control=AI routing matched Device Control, but the question lacks a clear control intent. The system falls back to the rule mode.
ai.chat.route.fallback.nl2sql.location.question=AI routing matched Intelligent Data Query, but the question is more likely source/code explanation, platform operation guidance, or configuration troubleshooting. The system falls back to Platform Assistant.
ai.chat.route.fallback.device.runtime.read=Device runtime read questions are forced to Intelligent Data Query to avoid triggering Device Control by mistake.
ai.chat.route.fast.platform.assistant=Matched the high-confidence platform help fast path. AUTO routing model call is skipped, and knowledge-base matching/fallback continues in the Platform Assistant route.
ai.chat.route.fast.nl2sql=Matched the high-confidence intelligent data query fast path. AUTO routing model call is skipped, and table semantics, permissions, and execution continue in the query route.
ai.chat.route.fast.device.control=Matched the high-confidence device control fast path. AUTO routing model call is skipped, and device/thing model binding and clarification continue in the control route.
ai.chat.route.fast.protocol.parse=Matched the high-confidence protocol parse fast path. AUTO routing model call is skipped, and protocol adaptation tasks continue in the protocol route.
ai.chat.route.fast.thing.model.generate=Matched the high-confidence thing model generation fast path. AUTO routing model call is skipped, and the import template is generated by the file parsing route.
ai.chat.route.fast.requirement.evaluation=Matched the high-confidence requirement evaluation fast path. AUTO routing model call is skipped, and the requirement file is processed by extraction and knowledge matching.
ai.chat.route.fast.general=Matched the general chat fast path. AUTO routing model call is skipped.
ai.chat.route.fallback.no.result=AI routing skill returned no result
ai.chat.route.fallback.parse.failed=AI routing skill structured parsing failed
ai.chat.route.fallback.no.target.mode=AI routing skill did not provide an adoptable target mode
ai.chat.route.fallback.no.confidence=AI routing skill did not return the confidence required for {}, so the system falls back to rule mode
ai.chat.route.fallback.low.confidence=AI routing mode confidence {} is below the {} threshold {}
ai.chat.route.fallback.local.rule=The system continues using the local rule mode
ai.chat.route.fallback.model.arbitration.timeout=AUTO route model arbitration timed out. The system falls back to the local layered route.
ai.chat.route.fallback.model.arbitration.interrupted=AUTO route model arbitration was interrupted. The system falls back to the local layered route.
ai.chat.route.fallback.model.arbitration.failed=AUTO route model arbitration failed. The system falls back to the local layered route.
ai.chat.route.upload.protocol.reason=Protocol file upload was forced into the Protocol Parse route. The backend protocol adaptation task handles document parsing, quality gates, and code package generation.
ai.chat.route.upload.thing.model.reason=File upload entered the Thing Model Generation route. The backend extracts device properties and generates the FastBee thing model import template.
ai.chat.route.upload.requirement.evaluation.reason=Requirement file upload entered the Requirement Evaluation route. The backend extracts requirement text, matches the platform knowledge base, and generates a preliminary evaluation result.
ai.skill.registry.duplicate.code=Duplicate AI skill code. Check the skill registration configuration: {}
ai.skill.registry.missing.skill.code=AI skill definition is missing skillCode. Check the skill metadata provider implementation.
