# 集成测试配置文件 - 使用真实的 Redis 和数据库
spring:
  # 允许 Bean 覆盖
  main:
    allow-bean-definition-overriding: true

  # 数据源配置 - 使用真实的 MySQL 数据库
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/fastbee?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: admin123  # 修改为实际密码
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000

  # Redis 配置 - 使用真实的 Redis
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      # 如果有密码请填写
      password: admin123
      database: 0
      timeout: 10000
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 5

  # SQL 初始化配置 - 集成测试时通常不需要自动初始化
  sql:
    init:
      mode: never  # 禁用自动 SQL 初始化
      # 如果需要初始化，可以配置：
      # mode: always
      # schema-locations: classpath:sql/schema.sql
      # data-locations: classpath:sql/data.sql
      # encoding: utf-8

  # 禁用某些自动配置
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.fastbee.**.domain
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    root: INFO
    com.fastbee: DEBUG
    # 打印 SQL 语句
    com.fastbee.**.mapper: DEBUG
